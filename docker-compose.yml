services:
  frontend:
    build:
      context: ./frontend
      target: dev        # stops at the dev stage — skips the Next.js build step
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # preserves container node_modules over the host mount
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
