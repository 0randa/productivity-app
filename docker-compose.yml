services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    # Dev: hot reload bound to all interfaces so it's reachable from the host
    command: sh -c "npm install && npx next dev --turbopack --hostname 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
